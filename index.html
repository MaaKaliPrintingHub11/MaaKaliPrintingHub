<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maa Kali Printing Hub & Shree Card Center</title>
<meta name="theme-color" content="#6d28d9">
<meta name="description" content="Premium Sublimation Printing, Wedding Cards, Gifts & Visiting Cards.">

<link rel="icon" href="logo1.jpeg">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* Background */
.bg-slide{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  animation:fade 24s infinite;
}
.bg-slide:nth-child(1){animation-delay:0s;}
.bg-slide:nth-child(2){animation-delay:8s;}
.bg-slide:nth-child(3){animation-delay:16s;}

@keyframes fade{
  0%,100%{opacity:0;}
  10%,30%{opacity:.6;}
}

/* Product Image */
.prod-img{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:16px;
  transition:.3s;
}
.prod-img:hover{
  transform:scale(1.05);
}

/* Slider */
.auto-slider{
  overflow:hidden;
}
.auto-track{
  display:flex;
  gap:16px;
  animation:scroll 40s linear infinite;
}
.auto-slider:hover .auto-track{
  animation-play-state:paused;
}
@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* Popup */
#imgPopup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#imgPopup img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
}
#closeBtn{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>

</head>

<body>

<!-- BACKGROUND -->
<div class="fixed inset-0 -z-10">
  <img src="bg1.png" class="bg-slide">
  <img src="bg2.png" class="bg-slide">
  <img src="bg3.png" class="bg-slide">
  <div class="absolute inset-0 bg-black/60"></div>
</div>

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-4">
  <h1 class="text-5xl md:text-7xl font-black">
    Maa Kali Printing Hub <br> & <br> Shree Card Center
  </h1>

  <p class="mt-4 text-lg text-purple-200">
    Sublimation Printing • Wedding Cards • Gifts
  </p>

  <div class="mt-6 flex gap-4">
    <a href="#products" class="bg-white text-purple-800 px-6 py-3 rounded-full">Explore</a>
    <a href="https://wa.me/919565959697" target="_blank"
       class="bg-green-500 px-6 py-3 rounded-full">WhatsApp</a>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products" class="py-16 px-6">
  <h2 class="text-4xl text-center font-bold mb-10">Our Products</h2>

  <div class="auto-slider">
    <div class="auto-track">
      <img src="t1.jpg" class="prod-img">
      <img src="t2.jpg" class="prod-img">
      <img src="t3.jpg" class="prod-img">
      <img src="t4.jpg" class="prod-img">
      <img src="t5.jpg" class="prod-img">

      <!-- duplicate for smooth loop -->
      <img src="t1.jpg" class="prod-img">
      <img src="t2.jpg" class="prod-img">
      <img src="t3.jpg" class="prod-img">
      <img src="t4.jpg" class="prod-img">
      <img src="t5.jpg" class="prod-img">
    </div>
  </div>
</section>

<!-- REVIEWS -->
<section class="py-16 px-6">
  <h2 class="text-3xl text-center mb-8">Customer Reviews</h2>

  <form id="form" class="max-w-xl mx-auto space-y-4">
    <input id="name" placeholder="Name" required class="w-full p-3 text-black rounded">
    <textarea id="msg" placeholder="Message" required class="w-full p-3 text-black rounded"></textarea>

    <input type="file" id="photo" accept="image/*">

    <button class="w-full bg-pink-500 py-3 rounded">Submit</button>
  </form>

  <div id="reviews" class="mt-10 space-y-4"></div>
</section>

<!-- POPUP -->
<div id="imgPopup">
  <span id="closeBtn" onclick="closePopup()">✖</span>
  <img id="popupImg">
</div>

<script>

const form = document.getElementById("form");

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const name = document.getElementById("name").value;
  const msg = document.getElementById("msg").value;
  const file = document.getElementById("photo").files[0];

  let base64 = "";

  if(file){
    if(file.size > 2*1024*1024){
      alert("Max 2MB image");
      return;
    }

    const reader = new FileReader();
    reader.onloadend = async ()=>{
      base64 = reader.result;
      send(name,msg,base64);
    };
    reader.readAsDataURL(file);
  }else{
    send(name,msg,"");
  }
});

async function send(name,msg,image){
  await fetch("YOUR_GOOGLE_SCRIPT_URL",{
    method:"POST",
    body:new URLSearchParams({name,msg,image})
  });

  alert("Review Submitted");
  location.reload();
}

/* POPUP */
function openPopup(src){
  document.getElementById("imgPopup").style.display="flex";
  document.getElementById("popupImg").src=src;
}
function closePopup(){
  document.getElementById("imgPopup").style.display="none";
}

</script>

</body>
</html>
